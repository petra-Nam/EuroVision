<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Eurovision Demo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1>Eurovision Demo</h1>
        <hr>

        <!-- Register Button -->
        <a href="/register" class="btn btn-primary mb-3">Register</a>

        <!-- Login Button -->
        <a href="/login" class="btn btn-success mb-3">Login</a>

        <h2>Songs</h2>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Country</th>
                    <th>Performers</th>
                    <th>Shows</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="song : ${songs}">
                    <td th:text="${song.title}"></td>
                    <td th:text="${song.country.name}"></td>
                    <td>
                        <ul>
                            <li th:each="performer : ${song.performers}" th:text="${performer.name}"></li>
                        </ul>
                    </td>
                    <td>
                        <ul>
                            <li th:each="show : ${song.shows}" th:text="${show.type}"></li>
                        </ul>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
