<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Grand Final Voting</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1>Grand Final Voting</h1>
        <p class="lead">Vote for your favorite songs in the Grand Final!</p>
        <hr>

        <h2>Finalists</h2>
        <table class="table table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Country</th>
                    <th>Song Title</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="song : ${finalists}">
                    <td th:text="${song.country.name}"></td>
                    <td th:text="${song.title}"></td>
                    <td>
                        <button class="btn btn-primary" th:onclick="'submitVote(' + ${song.id} + ')'">
                            Vote
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        async function submitVote(songId) {
            const url = `/api/vote/${songId}`;
            try {
                const response = await fetch(url, { method: 'POST' });
                const result = await response.text();
                alert(result);
            } catch (error) {
                console.error("Fetch error:", error);
                alert("Failed to submit vote.");
            }
        }
    </script>
</body>
</html>
