<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ESC 2026 Scoreboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .winner-row { background-color: #fff9c4 !important; font-weight: bold; }
        .points-badge { width: 50px; text-align: center; }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="display-4 text-primary">Scoreboard: <span th:text="${show.type}">Show</span></h1>
        <a href="/songs" class="btn btn-outline-secondary">Back to Voting</a>
    </div>

    <div class="card shadow">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Country</th>
                        <th>Song</th>
                        <th class="text-center">Jury</th>
                        <th class="text-center">Public</th>
                        <th class="text-center">Total</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="entry, iterStat : ${results}" th:classappend="${iterStat.first} ? 'winner-row'">
                        <td th:text="${iterStat.count}">1</td>
                        <td>
                            <span class="fw-bold" th:text="${entry.countryName}">Country</span>
                            <span th:if="${iterStat.first}"> 🏆</span>
                        </td>
                        <td th:text="${entry.songTitle}">Song Title</td>
                        <td class="text-center">
                            <span class="badge bg-secondary points-badge" th:text="${entry.juryPoints}">0</span>
                        </td>
                        <td class="text-center">
                            <span class="badge bg-info text-dark points-badge" th:text="${entry.publicPoints}">0</span>
                        </td>
                        <td class="text-center">
                            <span class="badge bg-primary points-badge" th:text="${entry.totalPoints}">0</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
