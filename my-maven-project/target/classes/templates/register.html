<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eurovision Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <h1>Eurovision Registration</h1>
    <p>Select your role and fill in the required details:</p>

    <form id="registrationForm">
        <div class="form-group">
            <label for="role">Select Role:</label>
            <select id="role" name="role" required>
                <option value="">-- Select Role --</option>
                <option value="voter">Voter</option>
                <option value="jury">Jury</option>
                <option value="performer">Performer</option>
                <option value="admin">Admin</option>
            </select>
        </div>

        <div id="commonFields">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="country">Country:</label>
                <input type="text" id="country" name="country" required>
            </div>
        </div>

        <div id="juryFields" class="hidden">
            <div class="form-group">
                <label for="jobTitle">Job Title:</label>
                <input type="text" id="jobTitle" name="jobTitle" placeholder="e.g., Music Expert">
            </div>
        </div>

        <div id="performerFields" class="hidden">
            <div class="form-group">
                <label for="performance">Performance Name:</label>
                <input type="text" id="performance" name="performance" placeholder="e.g., Song Title">
            </div>
        </div>

        <button type="submit">Register</button>
    </form>

    <p id="responseMessage"></p>

    <script>
        const roleSelect = document.getElementById('role');
        const juryFields = document.getElementById('juryFields');
        const performerFields = document.getElementById('performerFields');
        const registrationForm = document.getElementById('registrationForm');
        const responseMessage = document.getElementById('responseMessage');

        // Show/hide fields based on role selection
        roleSelect.addEventListener('change', () => {
            const role = roleSelect.value;
            juryFields.classList.add('hidden');
            performerFields.classList.add('hidden');

            if (role === 'jury') {
                juryFields.classList.remove('hidden');
            } else if (role === 'performer') {
                performerFields.classList.remove('hidden');
            }
        });

        // Handle form submission
        registrationForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const role = roleSelect.value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const country = document.getElementById('country').value;

            let data = { username, password, countryName: country, isJury: role === 'jury' };

            if (role === 'jury') {
                data.jobTitle = document.getElementById('jobTitle').value;
            } else if (role === 'performer') {
                data.performance = document.getElementById('performance').value;
            }

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                });

                if (response.ok) {
                    const result = await response.text();
                    responseMessage.textContent = result;
                    responseMessage.style.color = 'green';
                } else {
                    const error = await response.text();
                    responseMessage.textContent = `Error: ${error}`;
                    responseMessage.style.color = 'red';
                }
            } catch (error) {
                responseMessage.textContent = `Error: ${error.message}`;
                responseMessage.style.color = 'red';
            }
        });
    </script>
</body>
</html>
