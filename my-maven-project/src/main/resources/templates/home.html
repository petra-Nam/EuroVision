<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Eurovision Demo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1>Eurovision Demo</h1>
        <hr>

        <h2>Songs</h2>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Country</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="song : ${songs}">
                    <td th:text="${song.title}"></td>
                    <td th:text="${song.country.name}"></td>
                </tr>
            </tbody>
        </table>

        <h2>Shows</h2>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Type</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="show : ${shows}">
                    <td th:text="${show.type}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
